services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: smm-panel-app:latest
    container_name: smm-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - app-storage:/var/www/storage
      - app-public:/var/www/public
      - ./.env:/var/www/.env
    environment:
      - PHP_MEMORY_LIMIT=512M
      - PHP_MAX_EXECUTION_TIME=300
    networks:
      - smm-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    image: nginx:alpine
    container_name: smm-web
    restart: unless-stopped
    ports:
      - "8945:80"
    volumes:
      - app-public:/var/www/public:ro
      - app-storage:/var/www/storage:ro
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - smm-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: mariadb:10.11
    container_name: smm-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-smm_panel}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-smm_user}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    ports:
      - "3309:3306"
    networks:
      - smm-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME:-smm_user}", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: smm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - smm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: redis-server --appendonly yes

  # Laravel Scheduler - Runs cron jobs
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: smm-panel-app:latest
    container_name: smm-scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - app-storage:/var/www/storage
      - ./.env:/var/www/.env:ro
    networks:
      - smm-network
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"]

  # Laravel Queue Worker - Processes background jobs
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: smm-panel-app:latest
    container_name: smm-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - app-storage:/var/www/storage
      - ./.env:/var/www/.env:ro
    networks:
      - smm-network
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--max-time=3600"]
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M

networks:
  smm-network:
    driver: bridge

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
  app-storage:
    driver: local
  app-public:
    driver: local
